<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; width: 100%; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .tools { list-style: none; }
    .tools a { display: block; padding: 1rem; margin-bottom: 0.75rem; background: #fff; border-radius: 8px; text-decoration: none; color: #333; border: 1px solid #e0e0e0; transition: border-color 0.2s; }
    .tools a:hover { border-color: #999; }
    .tools .name { font-weight: 600; }
    .tools .desc { font-size: 0.875rem; color: #666; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tools</h1>
    <ul class="tools">
      <li><a href="/tools/pdf_watermark/">
        <div class="name">PDF Watermark</div>
        <div class="desc">为 PDF 添加自定义文字水印</div>
      </a></li>
    </ul>
  </div>
</body>
</html>
